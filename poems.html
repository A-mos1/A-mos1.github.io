<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing — Ahmed Moselhi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:        #FFF5E6;
      --ink:       #800000;
      --ink-faint: #a05050;
      --rule:      rgba(128,0,0,0.15);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Lora', Georgia, serif;
      font-size: 1.05rem;
      line-height: 1.75;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      padding: 0.6rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      font-family: 'DM Mono', monospace;
    }
    .topbar a { color: var(--ink-faint); text-decoration: none; }
    .topbar a:hover { color: var(--ink); text-decoration: underline; }
    .topbar .site-name { font-weight: 500; color: var(--ink); }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 600;
      margin: 0 0 0.4rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--ink-faint);
      margin-bottom: 3rem;
    }

    .series-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 0.5rem;
    }

    .post-list {
      list-style: none;
      margin: 0 0 3rem;
      padding: 0;
    }

    .post-list li {
      border-bottom: 1px solid var(--rule);
    }

    .post-list a {
      display: block;
      padding: 1.1rem 0;
      text-decoration: none;
      color: var(--ink);
    }
    .post-list a:hover .post-title { text-decoration: underline; }

    .post-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--ink-faint);
      margin-bottom: 0.2rem;
    }

    .post-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.3rem;
    }

    .post-desc {
      font-size: 0.88rem;
      color: var(--ink-faint);
      line-height: 1.5;
      font-style: italic;
    }
  </style>
</head>
<body>

<nav class="topbar">

  <a href="../index.html">&#8592; Home</a>
</nav>

</main>

</body>
</html>
